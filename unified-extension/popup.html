<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #F43397 0%, #9747FF 100%);
      color: #fff;
    }
    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }
    .tagline {
      text-align: center;
      font-size: 13px;
      opacity: 0.95;
      margin-bottom: 24px;
      font-weight: 500;
    }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .status {
      font-size: 13px;
      margin-bottom: 18px;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
    }
    .status.logged-in { background: rgba(76, 175, 80, 0.35); }
    input {
      width: 100%;
      padding: 13px 15px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255,255,255,0.97);
      color: #333;
      margin-bottom: 14px;
      font-family: inherit;
    }
    input::placeholder { color: #999; }
    input:focus { outline: 2px solid rgba(255,255,255,0.5); }
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary {
      background: #fff;
      color: #F43397;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.25);
      color: #fff;
      margin-top: 10px;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.35);
    }
    .user-info {
      text-align: center;
      margin-bottom: 14px;
    }
    .user-email {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .role-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.3);
      letter-spacing: 0.3px;
    }
    .hint {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 14px;
      text-align: center;
      line-height: 1.5;
    }
    .hint code {
      background: rgba(0,0,0,0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
    }
    .hub-feedback {
      display: none;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      text-align: center;
    }
    .hub-feedback.show { display: block; }
    .hub-feedback.ok   { background: rgba(76, 175, 80, 0.35); }
    .hub-feedback.err  { background: rgba(244, 67, 54, 0.35); }
    .hub-feedback.wait { background: rgba(255,255,255,0.15); }
    input#hubCodeInput  { text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="logo">Valmo</div>
  <div class="tagline">Unified Ops Assistant</div>
  
  <div class="card">
    <div id="status" class="status">Not logged in</div>
    
    <div id="loginForm">
      <input
        type="email"
        id="emailInput"
        placeholder="Work email address"
        autocomplete="email"
      />
      <input
        type="text"
        id="hubCodeInput"
        placeholder="Hub code (e.g. MUM-042)"
        maxlength="10"
        autocomplete="off"
        style="display:none;"
      />
      <div id="hubFeedback" class="hub-feedback"></div>
      <div id="roleSelectorSection" style="display:none; margin-bottom:14px;">
        <div style="font-size:11px; opacity:0.75; margin-bottom:8px; font-weight:600; text-align:center;">Your role in this hub:</div>
        <div style="display:flex; gap:8px;">
          <label id="roleCapLabel" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; background:rgba(255,255,255,0.3); border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; border:2px solid rgba(255,255,255,0.6);">
            <input type="radio" name="hubRole" value="captain" id="roleCapRadio" style="margin:0; width:auto;" checked> Captain
          </label>
          <label id="roleOpLabel" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; background:rgba(255,255,255,0.15); border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; border:2px solid transparent;">
            <input type="radio" name="hubRole" value="operator" id="roleOpRadio" style="margin:0; width:auto;"> Operator
          </label>
        </div>
      </div>
      <button class="btn-primary" id="loginBtn">Login</button>
      <div class="hint">
        Hub code is provided by your hub manager.<br>
        <code>captain@gmail.com</code> → use <code>TEST-001</code>
      </div>
    </div>
    
    <div id="loggedInView" style="display:none">
      <div class="user-info">
        <div class="user-email" id="userEmail"></div>
        <div class="role-badge" id="userRole"></div>
      </div>
      <button class="btn-secondary" id="logoutBtn">Logout</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
